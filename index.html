!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DKhang Shop</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
font-size:22px;
font-weight:bold;
color:red;
}

.search{
padding:8px;
width:300px;
border-radius:5px;
border:1px solid #ccc;
}

.container{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
}

.card p{
padding:10px;
font-size:14px;
text-align:center;
}

</style>

</head>

<body>

<header>
<div class="logo">DKhang Shop</div>
<input class="search" placeholder="Nhập tìm kiếm...">
</header>

<div class="container">

<h2>DỊCH VỤ GAME ROBLOX</h2>

<div class="grid">

<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-0f2eaf3c8b2c8a0c3f5d6c20c3c5b8d0/420/420/Image/Webp/noFilter">
<p>Gamepass Blox Fruit</p>
</div>

<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-5cfa8c1a02d293baffc7bcac28cf383e/420/420/Image/Webp/noFilter">
<p>Trái Ác Quỷ Blox Fruit</p>
</div>

<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-78d1e8b1c5b9d1d2b9a2c9a0e0d5e9a4/420/420/Image/Webp/noFilter">
<p>Dịch vụ Fisch</p>
</div>

<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-7f8e2f7b9b9c1b3b6f0d2e8f5a0c8b1a/420/420/Image/Webp/noFilter">
<p>Gamepass Battleground</p>
</div>

<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-19f4b0d7c2b0f1d3a9b0c3e1b2d4f5c6/420/420/Image/Webp/noFilter">
<p>Dịch vụ Anime Vanguards</p>
</div>

<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-b2a6d7c8e9f1a2b3c4d5e6f7a8b9c0d1/420/420/Image/Webp/noFilter">
<p>Dịch vụ Dead Rails</p>
</div>

<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-2b9f6a3e4c5d7a8b1c0d9e6f2a4b5c7d/420/420/Image/Webp/noFilter">
<p>Dịch vụ Grow a Garden</p>
</div>

<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-9b2c1d3e4f5a6b7c8d9e0f1a2b3c4d5e/420/420/Image/Webp/noFilter">
<p>Dịch vụ Pet Go</p>
</div>

</div>

</div>

</body>
</html>
